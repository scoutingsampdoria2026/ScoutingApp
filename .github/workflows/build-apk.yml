name: Build APK

# Quando parte la build: ad ogni push su main e ogni volta che clicchi "Run workflow" manualmente.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Rendi eseguibile gradlew
        run: chmod +x ./gradlew

      - name: Rigenera Gradle Wrapper (se manca il jar)
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.13
          fi

      - name: Costruisci APK debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Carica APK come artefatto scaricabile
        uses: actions/upload-artifact@v4
        with:
          name: ScoutingApp-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
