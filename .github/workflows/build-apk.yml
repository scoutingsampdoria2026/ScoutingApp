name: Build APK

# Quando parte la build: ad ogni push su main e ogni volta che clicchi "Run workflow" manualmente.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installa Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Rigenera il Gradle Wrapper (gradlew + jar) se mancano
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.13
          elif [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.13
          fi
          chmod +x ./gradlew

      - name: Decodifica keystore dai Secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/scouting-release.jks
          ls -la app/scouting-release.jks

      - name: Costruisci APK release firmato
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace -PversionNameOverride=${{ github.run_number }}

      - name: Rinomina APK con numero release
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk artifacts/ScoutingApp-v${{ github.run_number }}.apk

      - name: Carica APK come artefatto scaricabile
        uses: actions/upload-artifact@v4
        with:
          name: ScoutingApp-v${{ github.run_number }}
          path: artifacts/ScoutingApp-v${{ github.run_number }}.apk
          retention-days: 30
