name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installa Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Rigenera il Gradle Wrapper (gradlew + jar) se mancano
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.13
          elif [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.13
          fi
          chmod +x ./gradlew

      - name: Costruisci APK debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Carica APK come artefatto scaricabile
        uses: actions/upload-artifact@v4
        with:
          name: ScoutingApp-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
